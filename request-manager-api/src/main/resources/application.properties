spring.application.name=request-manager-api
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true
# Gera o log de depuração para a inicialização do datasource, incluindo a execução dos scripts SQL
logging.level.org.springframework.jdbc.datasource.init=DEBUG
# Permite que o Spring execute os scripts SQL de inicialização (data.sql)
spring.sql.init.mode=always
spring.sql.init.continue-on-error=false
server.port=5000
